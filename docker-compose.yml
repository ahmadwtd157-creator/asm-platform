services:
  backend:
    build: ./backend
    container_name: asm-backend
    ports: 
      - "5000:5000"
    depends_on:
      - db
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_NAME: asm_database
      DB_USER: asm_user
      DB_PASSWORD: asm_password

  frontend:
    build: ./frontend
    container_name: asm-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
  
  db:
    image: postgres:15
    container_name: asm-db
    environment:
      POSTGRES_USER: asm_user
      POSTGRES_PASSWORD: asm_password
      POSTGRES_DB: asm_database
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  postgres_data: