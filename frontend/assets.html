<!DOCTYPE html>
<html>
<head>
<title>Assets</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-4">

<h2>Assets</h2>

<div class="mb-3">
  <input id="domain" class="form-control mb-2" placeholder="Domain">
  <input id="ip" class="form-control mb-2" placeholder="IP Address">
  <button class="btn btn-primary" onclick="addAsset()">Add Asset</button>
</div>

<table class="table table-dark table-striped">
  <thead>
    <tr>
      <th>ID</th>
      <th>Domain</th>
      <th>IP</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="assetsTable"></tbody>
</table>

<script src="js/assets.js"></script>
</body>
</html>
