<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ASM Dashboard</title>

  <link rel="stylesheet" href="assets/vendor/adminlte/plugins/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="assets/vendor/adminlte/dist/css/adminlte.min.css">
</head>

<body class="hold-transition dark-mode sidebar-mini layout-fixed">

<div class="wrapper">

  <!-- include Navbar + Sidebar manually (سنحوّلها لاحقاً إلى component) -->

  <nav class="main-header navbar navbar-expand navbar-dark">
      <span class="navbar-brand ml-3">ASM Platform</span>
  </nav>

  <div class="content-wrapper">
    <section class="content pt-3">
      <div class="container-fluid">

        <!-- KPI Cards -->
        <div class="row">

          <div class="col-lg-3 col-6">
            <div class="small-box bg-info">
              <div class="inner">
                <h3 id="totalAssets">0</h3>
                <p>Total Assets</p>
              </div>
              <div class="icon">
                <i class="fas fa-server"></i>
              </div>
            </div>
          </div>

          <div class="col-lg-3 col-6">
            <div class="small-box bg-success">
              <div class="inner">
                <h3 id="lowRisk">0</h3>
                <p>Low Risk</p>
              </div>
            </div>
          </div>

          <div class="col-lg-3 col-6">
            <div class="small-box bg-warning">
              <div class="inner">
                <h3 id="mediumRisk">0</h3>
                <p>Medium Risk</p>
              </div>
            </div>
          </div>

          <div class="col-lg-3 col-6">
            <div class="small-box bg-danger">
              <div class="inner">
                <h3 id="highRisk">0</h3>
                <p>High Risk</p>
              </div>
            </div>
          </div>

        </div>

        <!-- Chart -->
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Risk Distribution</h3>
          </div>
          <div class="card-body">
            <canvas id="riskChart"></canvas>
          </div>
        </div>

      </div>
    </section>
  </div>

</div>

<script src="assets/vendor/adminlte/plugins/jquery/jquery.min.js"></script>
<script src="assets/vendor/adminlte/plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="assets/vendor/adminlte/plugins/chart.js/Chart.min.js"></script>
<script src="assets/vendor/adminlte/dist/js/adminlte.min.js"></script>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>

<script>
document.addEventListener("DOMContentLoaded", loadDashboard);
</script>

</body>
</html>
